server.port=8080
# logging.config 설정 제거 → Spring Boot가 logback-spring.xml을 자동 탐색
spring.main.allow-bean-definition-overriding=true

# =======================================================================
# EgovFrame Globals Configuration (formerly globals.properties)
# =======================================================================
Globals.OsType = WINDOWS
Globals.LocalIp = 127.0.0.1
Globals.DbType = mysql
Globals.UserName = egov-mysql
Globals.Password = egov-mysql

# Database Driver & URL
Globals.DriverClassName = net.sf.log4jdbc.DriverSpy
Globals.Url = jdbc:log4jdbc:mysql://127.0.0.1:3306/egov-mysql

# MainPage Setting
Globals.MainPage = /cmm/main/mainPage.do

# File Upload Settings
Globals.fileUpload.Extensions = .gif,.jpg,.jpeg,.png,.xls,.xlsx
Globals.fileUpload.maxFileSize = 104857600
Globals.fileUpload.maxRequestSize = 104857600
Globals.fileUpload.maxFileCount = 1000
Globals.fileUpload.fileSizeThreshold = 1048576
Globals.fileStorePath = /upload/pst

# BBS File Attach Size
Globals.posblAtchFileSize = 10485760

# File ID Encryption Key
Globals.File.algorithmKey = egovframe


# =======================================================================
# EgovFrame Env Crypto Configuration (formerly crypto-config.properties)
# =======================================================================
# egov-crypto 설정
egovCryptoConfig.id = egovCryptoConfig
egovCryptoConfig.initial = true
egovCryptoConfig.crypto = true
egovCryptoConfig.algorithm = SHA-256
egovCryptoConfig.algorithmKey = egovframe
egovCryptoConfig.algorithmKeyHash = gdyYs/IZqY86VcWhT8emCYfqY1ahw2vtLG+/FzNqtrQ=
egovCryptoConfig.cryptoBlockSize = 1024
egovCryptoConfig.cryptoPropertyLocation = classpath:/application.properties
egovCryptoConfig.plainDigest = false

# 호환성을 위해 접두사 없는 키도 유지
initial = true
crypto = true
algorithm = SHA-256
algorithmKey = egovframe
algorithmKeyHash = gdyYs/IZqY86VcWhT8emCYfqY1ahw2vtLG+/FzNqtrQ=
cryptoBlockSize = 1024
cryptoPropertyLocation = classpath:/application.properties
plainDigest = false


# =======================================================================
# EgovFrame Security Configuration
# → 실제 설정은 EgovSecurityConfigReader가 읽는 파일에서 관리:
#   resources/egovframework/egovProps/conf/egov-security-config.properties
# → application.properties에는 통합 불가 (라이브러리 내부에 경로 하드코딩)
# =======================================================================

# CORS configuration
cors.allowed-origins=http://localhost:5173

